name: sync-env-to-org-secrets

# PAUSED 2026-06-22 evening per user mandate:
# "Don't hit the GitHub API so many times. Requests have to be made only on the
# organization level, not to the individual repositories. The CICD pipelines will
# use the global environment variables only."
#
# chirag127 is a USER account, not a real GH Organization. User accounts CANNOT
# hold org-level secrets — this workflow was fanning out 65 env vars × 42 repos
# = 2,730 API calls per run, hitting the 5K/hr rate limit (88% success rate).
#
# Fix: migrate the 58 chirag127/* repos to a real GH Org (`oriz`). Then secrets
# live at the org level (one set, all repos inherit) instead of per-repo.
# See: knowledge/decisions/security/org-level-secrets-only.md
#
# Cron is DISABLED. Only `workflow_dispatch` works (manual one-shot).

# Decrypts master .env.enc and fans out every canonical key to every
# chirag127/oriz* + workspace repo as repo-level Actions secrets.
#
# Bootstrap: user must create GH_ADMIN_PAT secret on this repo (workspace)
# with `repo` scope (enough for repo-level secrets across user-owned repos).

on:
  # Cron DISABLED 2026-06-22 — replaced by org-level secrets after migration.
  # schedule:
  #   - cron: "30 1 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".env.enc"
      - "templates/.env.example"
      - "scripts/sync-env-to-org-secrets.mjs"
      - ".github/workflows/sync-env-to-org-secrets.yml"

permissions:
  contents: read

concurrency:
  group: sync-env-to-org-secrets
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install sops + age
        run: |
          set -euo pipefail
          # age is in the default apt repo on Ubuntu 22.04+
          sudo apt-get update -qq
          sudo apt-get install -y age
          # sops via official release binary
          SOPS_VERSION="3.12.2"
          curl -sSL -o /tmp/sops "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
          sudo install -m 0755 /tmp/sops /usr/local/bin/sops
          sops --version
          age --version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Write age key to file
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SOPS_AGE_KEY:-}" ]; then
            echo "::error::SOPS_AGE_KEY secret not set on this repo. Set it once via: gh secret set SOPS_AGE_KEY --repo chirag127/workspace --body \"\$(cat .sops-age-key.txt)\""
            exit 1
          fi
          printf "%s" "$SOPS_AGE_KEY" > "$RUNNER_TEMP/age.key"
          chmod 600 "$RUNNER_TEMP/age.key"
          echo "SOPS_AGE_KEY_FILE=$RUNNER_TEMP/age.key" >> "$GITHUB_ENV"

      - name: Run sync script
        env:
          # GH_ADMIN_PAT needs `repo` scope to write repo-level secrets across user-owned repos.
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::GH_ADMIN_PAT secret not set on this repo. Generate a PAT with 'repo' scope at https://github.com/settings/tokens and set it via: gh secret set GH_ADMIN_PAT --repo chirag127/workspace --body \"ghp_...\""
            exit 1
          fi
          node scripts/sync-env-to-org-secrets.mjs
