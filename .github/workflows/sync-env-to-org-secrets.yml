name: sync-env-to-org-secrets

# 2026-06-22: migrated to oriz-co GH Organization.
# Now pushes ~65 secrets ONCE at the org level (visibility=all), not per-repo.
# Reduced from ~3,770 API calls to ~65 per run.

# Decrypts master .env.enc and pushes every canonical key to the oriz-co
# Organization as an org-level Actions secret with visibility=all.
#
# Bootstrap: user must create GH_ADMIN_PAT secret on this repo (workspace)
# with `admin:org` + `repo` scopes (org-level secrets require admin:org).

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".env.enc"
      - "templates/.env.example"
      - "scripts/sync-env-to-org-secrets.mjs"
      - ".github/workflows/sync-env-to-org-secrets.yml"

permissions:
  contents: read

concurrency:
  group: sync-env-to-org-secrets
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install sops + age
        run: |
          set -euo pipefail
          # age is in the default apt repo on Ubuntu 22.04+
          sudo apt-get update -qq
          sudo apt-get install -y age
          # sops via official release binary
          SOPS_VERSION="3.12.2"
          curl -sSL -o /tmp/sops "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
          sudo install -m 0755 /tmp/sops /usr/local/bin/sops
          sops --version
          age --version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Write age key to file
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SOPS_AGE_KEY:-}" ]; then
            echo "::error::SOPS_AGE_KEY secret not set on this repo. Set it once via: gh secret set SOPS_AGE_KEY --repo oriz-co/workspace --body \"\$(cat .sops-age-key.txt)\""
            exit 1
          fi
          printf "%s" "$SOPS_AGE_KEY" > "$RUNNER_TEMP/age.key"
          chmod 600 "$RUNNER_TEMP/age.key"
          echo "SOPS_AGE_KEY_FILE=$RUNNER_TEMP/age.key" >> "$GITHUB_ENV"

      - name: Run sync script
        env:
          # GH_ADMIN_PAT needs `admin:org` + `repo` scopes to write org-level secrets on oriz-co.
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::GH_ADMIN_PAT secret not set. Generate a PAT with 'admin:org' + 'repo' scopes at https://github.com/settings/tokens and set it via: gh secret set GH_ADMIN_PAT --org oriz-co --visibility all --body \"ghp_...\""
            exit 1
          fi
          node scripts/sync-env-to-org-secrets.mjs
