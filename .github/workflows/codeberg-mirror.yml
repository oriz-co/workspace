name: Mirror to Codeberg

# Nightly DR mirror to codeberg.org/oriz-co. Why: GitHub is a single point of
# failure for 60+ family repos. Codeberg is free, non-profit, no card needed.
# If GitHub disappears, we clone from Codeberg and re-point CF Pages.
# Full runbook: knowledge/runbooks/codeberg-mirror-2026-06-23.md

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC daily (08:30 IST)
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Mirror all org repos
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT }}
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          set -e
          if [ -z "$CODEBERG_TOKEN" ]; then
            echo "::warning::CODEBERG_TOKEN not set — skipping mirror. See knowledge/runbooks/codeberg-mirror-2026-06-23.md"
            exit 0
          fi
          # List all repos under oriz-co
          gh api -X GET orgs/oriz-co/repos --paginate -q '.[].name' > repos.txt
          failed=0
          while read repo; do
            echo "--- mirroring $repo ---"
            rm -rf /tmp/mirror-${repo}
            git clone --mirror "https://x-access-token:${GH_TOKEN}@github.com/oriz-co/${repo}.git" /tmp/mirror-${repo} || { echo "::warning::clone ${repo} failed"; failed=$((failed+1)); continue; }
            # Create on Codeberg if missing (idempotent — 409 if exists, 201 if created, both fine)
            curl -s -o /dev/null -X POST -H "Authorization: token ${CODEBERG_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://codeberg.org/api/v1/orgs/oriz-co/repos" \
              -d "{\"name\":\"${repo}\",\"private\":false,\"auto_init\":false}" || true
            cd /tmp/mirror-${repo}
            git push --mirror "https://oriz-co:${CODEBERG_TOKEN}@codeberg.org/oriz-co/${repo}.git" || { echo "::warning::push ${repo} failed"; failed=$((failed+1)); }
            cd "$GITHUB_WORKSPACE"
            rm -rf /tmp/mirror-${repo}
          done < repos.txt
          echo "Done. $failed failures out of $(wc -l < repos.txt) repos."
